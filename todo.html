<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 20px;
        }

        /* Input Section */
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .input-field {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: #667eea;
        }

        .add-btn {
            padding: 12px 20px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .add-btn:active {
            transform: translateY(0);
        }

        /* Filter Buttons */
        .filter-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            background: #f0f0f0;
            border: 2px solid transparent;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .filter-btn:hover {
            background: #e0e0e0;
        }

        .filter-btn.active:hover {
            background: #764ba2;
        }

        /* Stats */
        .stats {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .stat {
            background: #f5f5f5;
            padding: 8px 12px;
            border-radius: 6px;
            flex: 1;
            text-align: center;
        }

        .stat strong {
            color: #667eea;
        }

        /* Todo List */
        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }

        .todo-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .todo-item.completed {
            opacity: 0.6;
            border-left-color: #10b981;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #999;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .todo-text {
            flex: 1;
            font-size: 14px;
            color: #333;
            word-break: break-word;
        }

        .todo-priority {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .todo-priority.high {
            background: #fed7d7;
            color: #c53030;
        }

        .todo-priority.medium {
            background: #feebc8;
            color: #c05621;
        }

        .todo-priority.low {
            background: #c6f6d5;
            color: #22543d;
        }

        .delete-btn {
            width: 24px;
            height: 24px;
            border: none;
            background: #ff6b6b;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:hover {
            background: #ff5252;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* Clear All Button */
        .clear-all-btn {
            width: 100%;
            padding: 10px;
            background: #f5f5f5;
            border: none;
            border-radius: 8px;
            color: #ff6b6b;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }

        .clear-all-btn:hover {
            background: #ffebee;
        }

        /* Scrollbar Styling */
        .todo-list::-webkit-scrollbar {
            width: 6px;
        }

        .todo-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .todo-list::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .todo-list::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }

        /* Priority Select */
        .priority-select {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            background: white;
            color: #333;
        }

        .priority-select:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Animations */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .todo-item {
            animation: slideIn 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 My Tasks</h1>
            <p>Stay organized and productive</p>
        </div>

        <div class="content">
            <!-- Input Section -->
            <div class="input-section">
                <input 
                    type="text" 
                    id="todoInput" 
                    class="input-field" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <select id="prioritySelect" class="priority-select">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
                <button class="add-btn" onclick="addTodo()">Add</button>
            </div>

            <!-- Stats -->
            <div class="stats">
                <div class="stat">Total: <strong id="totalCount">0</strong></div>
                <div class="stat">Completed: <strong id="completedCount">0</strong></div>
                <div class="stat">Pending: <strong id="pendingCount">0</strong></div>
            </div>

            <!-- Filter Buttons -->
            <div class="filter-section">
                <button class="filter-btn active" onclick="filterTodos('all')">All</button>
                <button class="filter-btn" onclick="filterTodos('pending')">Pending</button>
                <button class="filter-btn" onclick="filterTodos('completed')">Completed</button>
                <button class="filter-btn" onclick="filterTodos('high')">High Priority</button>
            </div>

            <!-- Todo List -->
            <div class="todo-list" id="todoList">
                <div class="empty-state">
                    <div class="empty-state-icon">✨</div>
                    <p>No tasks yet. Add one to get started!</p>
                </div>
            </div>

            <!-- Clear All Button -->
            <button class="clear-all-btn" onclick="clearAllTodos()">Clear All Completed</button>
        </div>
    </div>

    <script>
        let todos = [];
        let currentFilter = 'all';

        // Load todos from localStorage
        function loadTodos() {
            const saved = localStorage.getItem('todos');
            if (saved) {
                todos = JSON.parse(saved);
            }
            renderTodos();
        }

        // Save todos to localStorage
        function saveTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        // Add new todo
        function addTodo() {
            const input = document.getElementById('todoInput');
            const priority = document.getElementById('prioritySelect').value;
            const text = input.value.trim();

            if (text === '') {
                alert('Please enter a task');
                return;
            }

            const todo = {
                id: Date.now(),
                text: text,
                completed: false,
                priority: priority,
                createdAt: new Date().toLocaleString()
            };

            todos.unshift(todo);
            input.value = '';
            input.focus();
            saveTodos();
            renderTodos();
        }

        // Toggle todo completion
        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                saveTodos();
                renderTodos();
            }
        }

        // Delete todo
        function deleteTodo(id) {
            todos = todos.filter(t => t.id !== id);
            saveTodos();
            renderTodos();
        }

        // Clear all completed todos
        function clearAllTodos() {
            if (todos.some(t => t.completed)) {
                if (confirm('Are you sure you want to delete all completed tasks?')) {
                    todos = todos.filter(t => !t.completed);
                    saveTodos();
                    renderTodos();
                }
            } else {
                alert('No completed tasks to clear');
            }
        }

        // Filter todos
        function filterTodos(filter) {
            currentFilter = filter;
            
            // Update filter button styles
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderTodos();
        }

        // Update stats
        function updateStats() {
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            const pending = total - completed;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('pendingCount').textContent = pending;
        }

        // Render todos
        function renderTodos() {
            const todoList = document.getElementById('todoList');
            
            let filtered = todos;
            if (currentFilter === 'pending') {
                filtered = todos.filter(t => !t.completed);
            } else if (currentFilter === 'completed') {
                filtered = todos.filter(t => t.completed);
            } else if (currentFilter === 'high') {
                filtered = todos.filter(t => t.priority === 'high');
            }

            if (filtered.length === 0) {
                todoList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">✨</div>
                        <p>No tasks to display</p>
                    </div>
                `;
            } else {
                todoList.innerHTML = filtered.map(todo => `
                    <div class="todo-item ${todo.completed ? 'completed' : ''}">
                        <input 
                            type="checkbox" 
                            class="checkbox" 
                            ${todo.completed ? 'checked' : ''}
                            onchange="toggleTodo(${todo.id})"
                        >
                        <div class="todo-text">${escapeHtml(todo.text)}</div>
                        <span class="todo-priority ${todo.priority}">${todo.priority}</span>
                        <button class="delete-btn" onclick="deleteTodo(${todo.id})">✕</button>
                    </div>
                `).join('');
            }

            updateStats();
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Allow Enter key to add todo
        document.getElementById('todoInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTodo();
            }
        });

        // Initialize
        loadTodos();
    </script>
</body>
</html>
