<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 11 Desktop</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #root {
            width: 100%;
            height: 100%;
        }

        .desktop-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .desktop-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        /* デスクトップアイコン */
        .desktop-icons {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            z-index: 10;
        }

        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            width: 80px;
            text-align: center;
            transition: transform 0.2s;
        }

        .desktop-icon:hover {
            transform: scale(1.05);
        }

        .desktop-icon-image {
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .desktop-icon:hover .desktop-icon-image {
            background: rgba(255, 255, 255, 0.15);
        }

        .desktop-icon-label {
            color: white;
            font-size: 12px;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* ウィンドウ */
        .window {
            position: absolute;
            background: rgba(32, 32, 32, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            min-width: 400px;
            min-height: 300px;
            z-index: 100;
            color: white;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .window.minimized {
            display: none !important;
        }

        .window-title {
            background: rgba(45, 45, 45, 0.7);
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 500;
            cursor: move;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px 12px 0 0;
            user-select: none;
        }

        .window-title span {
            flex: 1;
        }

        .window-buttons {
            display: flex;
            gap: 8px;
        }

        .window-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
            border-radius: 6px;
        }

        .window-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .window-btn.close:hover {
            background: #e81828;
        }

        .window-content {
            flex: 1;
            padding: 16px;
            overflow: auto;
            background: rgba(32, 32, 32, 0.5);
        }

        /* タスクバー */
        .taskbar {
            height: 56px;
            background: rgba(32, 32, 32, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 10000;
            padding: 0 12px;
        }

        .taskbar-apps {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .taskbar-app {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .taskbar-app:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .taskbar-app.active {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .taskbar-end {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            font-size: 12px;
        }

        .clock {
            padding: 0 12px;
            text-align: right;
            font-weight: 500;
        }

        /* スタートメニュー */
        .start-menu {
            position: fixed;
            bottom: 56px;
            left: 50%;
            transform: translateX(-50%);
            width: 540px;
            max-height: 680px;
            background: rgba(32, 32, 32, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: none;
            flex-direction: column;
            z-index: 9999;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .start-menu.active {
            display: flex;
        }

        .start-menu-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 16px;
            font-weight: 600;
            color: white;
        }

        .start-menu-items {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .start-menu-item {
            padding: 12px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            font-size: 14px;
            color: white;
            border-radius: 8px;
            margin-bottom: 4px;
        }

        .start-menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .start-menu-item-icon {
            font-size: 20px;
        }

        /* To-Do List スタイル */
        .todolist-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .todo-input-section {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: rgba(45, 45, 45, 0.7);
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .todo-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .todo-input:focus {
            outline: none;
            border-color: rgba(0, 120, 212, 0.5);
            background: rgba(255, 255, 255, 0.08);
        }

        .todo-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .todo-priority-select {
            padding: 6px 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            cursor: pointer;
        }

        .todo-priority-select:focus {
            outline: none;
            border-color: rgba(0, 120, 212, 0.5);
        }

        .todo-add-btn {
            padding: 8px 16px;
            background: rgba(0, 120, 212, 0.8);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .todo-add-btn:hover {
            background: rgba(0, 120, 212, 1);
        }

        .todo-stats {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: rgba(45, 45, 45, 0.7);
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
        }

        .todo-stat {
            flex: 1;
        }

        .todo-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: rgba(45, 45, 45, 0.7);
            border-radius: 8px;
            font-size: 13px;
            color: white;
            transition: all 0.2s;
        }

        .todo-item:hover {
            background: rgba(45, 45, 45, 0.9);
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: rgba(255, 255, 255, 0.5);
        }

        .todo-checkbox {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .todo-text {
            flex: 1;
        }

        .todo-priority-tag {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }

        .todo-priority-tag.high {
            background: rgba(232, 24, 40, 0.3);
            color: #ff6b6b;
        }

        .todo-priority-tag.medium {
            background: rgba(255, 206, 0, 0.3);
            color: #ffd666;
        }

        .todo-priority-tag.low {
            background: rgba(16, 185, 129, 0.3);
            color: #5eead4;
        }

        .todo-delete-btn {
            width: 24px;
            height: 24px;
            background: rgba(232, 24, 40, 0.2);
            border: none;
            color: #ff6b6b;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .todo-delete-btn:hover {
            background: rgba(232, 24, 40, 0.5);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        /* その他アプリ */
        .notepad-textarea {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: white;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            padding: 8px;
            resize: none;
        }

        .notepad-textarea:focus {
            outline: none;
            border-color: rgba(0, 120, 212, 0.5);
            background: rgba(255, 255, 255, 0.08);
        }

        .notepad-textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .calculator {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .calc-display {
            grid-column: 1 / -1;
            background: rgba(45, 45, 45, 0.7);
            color: #0078d4;
            padding: 12px;
            text-align: right;
            font-size: 24px;
            font-family: 'Courier New', monospace;
            margin-bottom: 8px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .calc-btn {
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .calc-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .calc-btn.operator {
            background: rgba(0, 120, 212, 0.3);
            border-color: rgba(0, 120, 212, 0.5);
            color: #0078d4;
        }

        .calc-btn.operator:hover {
            background: rgba(0, 120, 212, 0.5);
        }

        .calc-btn.equals {
            grid-column: 1 / -1;
            background: rgba(0, 120, 212, 0.5);
            border-color: rgba(0, 120, 212, 0.7);
        }

        .calc-btn.equals:hover {
            background: rgba(0, 120, 212, 0.7);
        }

        /* スクロール */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function Window({ id, title, children, onClose, onMinimize, position, zIndex, minimized }) {
            const [pos, setPos] = useState(position);
            const [isDragging, setIsDragging] = useState(false);
            const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
            const titleRef = useRef(null);

            const handleMouseDown = (e) => {
                if (titleRef.current && titleRef.current.contains(e.target)) {
                    setIsDragging(true);
                    setDragOffset({
                        x: e.clientX - pos.x,
                        y: e.clientY - pos.y
                    });
                }
            };

            useEffect(() => {
                const handleMouseMove = (e) => {
                    if (isDragging) {
                        setPos({
                            x: e.clientX - dragOffset.x,
                            y: e.clientY - dragOffset.y
                        });
                    }
                };

                const handleMouseUp = () => {
                    setIsDragging(false);
                };

                if (isDragging) {
                    document.addEventListener('mousemove', handleMouseMove);
                    document.addEventListener('mouseup', handleMouseUp);
                }

                return () => {
                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseup', handleMouseUp);
                };
            }, [isDragging, dragOffset]);

            return (
                <div
                    className={`window ${minimized ? 'minimized' : ''}`}
                    style={{
                        left: `${pos.x}px`,
                        top: `${pos.y}px`,
                        zIndex: zIndex,
                    }}
                >
                    <div className="window-title" ref={titleRef} onMouseDown={handleMouseDown}>
                        <span>{title}</span>
                        <div className="window-buttons">
                            <button className="window-btn" onClick={onMinimize}>_</button>
                            <button className="window-btn" onClick={onMinimize}>□</button>
                            <button className="window-btn close" onClick={onClose}>✕</button>
                        </div>
                    </div>
                    <div className="window-content">
                        {children}
                    </div>
                </div>
            );
        }

        function TodoApp() {
            const [todos, setTodos] = useState([]);
            const [input, setInput] = useState('');
            const [priority, setPriority] = useState('medium');

            useEffect(() => {
                const saved = localStorage.getItem('win11Todos');
                if (saved) {
                    setTodos(JSON.parse(saved));
                }
            }, []);

            const saveTodos = (newTodos) => {
                setTodos(newTodos);
                localStorage.setItem('win11Todos', JSON.stringify(newTodos));
            };

            const addTodo = () => {
                if (input.trim() === '') return;
                const newTodo = {
                    id: Date.now(),
                    text: input,
                    completed: false,
                    priority: priority
                };
                saveTodos([newTodo, ...todos]);
                setInput('');
            };

            const toggleTodo = (id) => {
                saveTodos(todos.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
            };

            const deleteTodo = (id) => {
                saveTodos(todos.filter(t => t.id !== id));
            };

            const total = todos.length;
            const done = todos.filter(t => t.completed).length;
            const pending = total - done;

            return (
                <div className="todolist-container">
                    <div className="todo-input-section">
                        <input
                            type="text"
                            className="todo-input"
                            placeholder="新しいタスク..."
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            onKeyPress={(e) => e.key === 'Enter' && addTodo()}
                        />
                        <select className="todo-priority-select" value={priority} onChange={(e) => setPriority(e.target.value)}>
                            <option value="low">低</option>
                            <option value="medium">中</option>
                            <option value="high">高</option>
                        </select>
                        <button className="todo-add-btn" onClick={addTodo}>追加</button>
                    </div>
                    <div className="todo-stats">
                        <div className="todo-stat">合計: <strong>{total}</strong></div>
                        <div className="todo-stat">完了: <strong>{done}</strong></div>
                        <div className="todo-stat">未完: <strong>{pending}</strong></div>
                    </div>
                    <div className="todo-list">
                        {todos.length === 0 ? (
                            <div className="empty-state">
                                <div className="empty-state-icon">✨</div>
                                <div>タスクなし</div>
                            </div>
                        ) : (
                            todos.map(todo => (
                                <div key={todo.id} className={`todo-item ${todo.completed ? 'completed' : ''}`}>
                                    <input
                                        type="checkbox"
                                        className="todo-checkbox"
                                        checked={todo.completed}
                                        onChange={() => toggleTodo(todo.id)}
                                    />
                                    <div className="todo-text">{todo.text}</div>
                                    <span className={`todo-priority-tag ${todo.priority}`}>{todo.priority}</span>
                                    <button className="todo-delete-btn" onClick={() => deleteTodo(todo.id)}>✕</button>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        function Calculator() {
            const [display, setDisplay] = useState('0');
            const [prevValue, setPrevValue] = useState(null);
            const [operator, setOperator] = useState(null);
            const [newNumber, setNewNumber] = useState(true);

            const handleNumber = (num) => {
                if (newNumber) {
                    setDisplay(String(num));
                    setNewNumber(false);
                } else {
                    setDisplay(display === '0' ? String(num) : display + num);
                }
            };

            const handleOperator = (op) => {
                setPrevValue(parseFloat(display));
                setOperator(op);
                setNewNumber(true);
            };

            const handleEquals = () => {
                if (operator && prevValue !== null) {
                    const curr = parseFloat(display);
                    let result = 0;
                    switch (operator) {
                        case '+': result = prevValue + curr; break;
                        case '-': result = prevValue - curr; break;
                        case '*': result = prevValue * curr; break;
                        case '/': result = prevValue / curr; break;
                    }
                    setDisplay(String(result));
                    setPrevValue(null);
                    setOperator(null);
                    setNewNumber(true);
                }
            };

            const handleClear = () => {
                setDisplay('0');
                setPrevValue(null);
                setOperator(null);
                setNewNumber(true);
            };

            const buttons = [
                ['C', '←', '%', '/'],
                ['7', '8', '9', '*'],
                ['4', '5', '6', '-'],
                ['1', '2', '3', '+'],
                ['0', '.', '=']
            ];

            return (
                <div className="calculator">
                    <div className="calc-display">{display}</div>
                    {buttons.map((row, i) => (
                        row.map((btn, j) => (
                            <button
                                key={`${i}-${j}`}
                                className={`calc-btn ${['/', '*', '-', '+'].includes(btn) ? 'operator' : ''} ${btn === '=' ? 'equals' : ''}`}
                                onClick={() => {
                                    if (btn === 'C') handleClear();
                                    else if (btn === '←') setDisplay(display.slice(0, -1) || '0');
                                    else if (btn === '%') setDisplay(String(parseFloat(display) / 100));
                                    else if (['+', '-', '*', '/'].includes(btn)) handleOperator(btn);
                                    else if (btn === '=') handleEquals();
                                    else handleNumber(btn);
                                }}
                                style={btn === '0' ? { gridColumn: '1 / 3' } : {}}
                            >
                                {btn}
                            </button>
                        ))
                    ))}
                </div>
            );
        }

        function Desktop() {
            const [windows, setWindows] = useState([
                { id: 'notepad', title: '📝 メモ帳', visible: false, minimized: false, position: { x: 100, y: 100 } },
                { id: 'calculator', title: '🧮 計算機', visible: false, minimized: false, position: { x: 400, y: 150 } },
                { id: 'todolist', title: '✓ タスク', visible: false, minimized: false, position: { x: 700, y: 200 } },
            ]);
            const [startMenuOpen, setStartMenuOpen] = useState(false);
            const [clock, setClock] = useState(new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }));
            const [zIndex, setZIndex] = useState(100);
            const [notepadContent, setNotepadContent] = useState('');

            useEffect(() => {
                const timer = setInterval(() => {
                    setClock(new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }));
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const toggleWindow = (id) => {
                setWindows(windows.map(w =>
                    w.id === id ? { ...w, visible: !w.visible, minimized: false } : w
                ));
                setZIndex(zIndex + 1);
                setStartMenuOpen(false);
            };

            const closeWindow = (id) => {
                setWindows(windows.map(w => w.id === id ? { ...w, visible: false } : w));
            };

            const minimizeWindow = (id) => {
                setWindows(windows.map(w => w.id === id ? { ...w, minimized: !w.minimized } : w));
            };

            const openWindow = (id) => {
                setWindows(windows.map(w => w.id === id ? { ...w, visible: true, minimized: false } : w));
                setStartMenuOpen(false);
                setZIndex(zIndex + 1);
            };

            const getWindowContent = (id) => {
                switch (id) {
                    case 'notepad':
                        return <textarea className="notepad-textarea" placeholder="ここに入力..." value={notepadContent} onChange={(e) => setNotepadContent(e.target.value)} />;
                    case 'calculator':
                        return <Calculator />;
                    case 'todolist':
                        return <TodoApp />;
                    default:
                        return null;
                }
            };

            return (
                <div className="desktop-container">
                    <div className="desktop-area">
                        <div className="desktop-icons">
                            <div className="desktop-icon" onDoubleClick={() => openWindow('notepad')}>
                                <div className="desktop-icon-image">📝</div>
                                <div className="desktop-icon-label">メモ帳</div>
                            </div>
                            <div className="desktop-icon" onDoubleClick={() => openWindow('calculator')}>
                                <div className="desktop-icon-image">🧮</div>
                                <div className="desktop-icon-label">計算機</div>
                            </div>
                            <div className="desktop-icon" onDoubleClick={() => openWindow('todolist')}>
                                <div className="desktop-icon-image">✓</div>
                                <div className="desktop-icon-label">タスク</div>
                            </div>
                        </div>

                        {windows.filter(w => w.visible).map((w, idx) => (
                            <Window
                                key={w.id}
                                id={w.id}
                                title={w.title}
                                position={w.position}
                                zIndex={zIndex - windows.length + idx}
                                minimized={w.minimized}
                                onClose={() => closeWindow(w.id)}
                                onMinimize={() => minimizeWindow(w.id)}
                            >
                                {getWindowContent(w.id)}
                            </Window>
                        ))}

                        {startMenuOpen && (
                            <div className="start-menu active">
                                <div className="start-menu-header">👤 Windows 11</div>
                                <div className="start-menu-items">
                                    <div className="start-menu-item" onClick={() => openWindow('notepad')}>
                                        <span className="start-menu-item-icon">📝</span>
                                        <span>メモ帳</span>
                                    </div>
                                    <div className="start-menu-item" onClick={() => openWindow('calculator')}>
                                        <span className="start-menu-item-icon">🧮</span>
                                        <span>計算機</span>
                                    </div>
                                    <div className="start-menu-item" onClick={() => openWindow('todolist')}>
                                        <span className="start-menu-item-icon">✓</span>
                                        <span>タスク管理</span>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="taskbar">
                        <div className="taskbar-apps">
                            <button
                                className="taskbar-app"
                                onClick={() => setStartMenuOpen(!startMenuOpen)}
                                title="スタート"
                            >
                                ⊞
                            </button>
                            {windows.map(w => (
                                <button
                                    key={w.id}
                                    className={`taskbar-app ${w.visible && !w.minimized ? 'active' : ''}`}
                                    onClick={() => toggleWindow(w.id)}
                                    title={w.title}
                                >
                                    {w.title.split(' ')[0]}
                                </button>
                            ))}
                        </div>
                        <div className="taskbar-end">
                            <div className="clock">{clock}</div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<Desktop />, document.getElementById('root'));
    </script>
</body>
</html>
