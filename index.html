<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 11 Desktop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            color: white;
        }

        .desktop-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .desktop-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        /* デスクトップアイコン */
        .desktop-icons {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            z-index: 10;
        }

        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            width: 80px;
            text-align: center;
            transition: transform 0.2s;
        }

        .desktop-icon:hover {
            transform: scale(1.05);
        }

        .desktop-icon-image {
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .desktop-icon:hover .desktop-icon-image {
            background: rgba(255, 255, 255, 0.15);
        }

        .desktop-icon-label {
            color: white;
            font-size: 12px;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* ウィンドウ */
        .window {
            position: absolute;
            background: rgba(32, 32, 32, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            min-width: 450px;
            min-height: 350px;
            z-index: 100;
            color: white;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .window.hidden {
            display: none !important;
        }

        .window-title {
            background: rgba(45, 45, 45, 0.7);
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 500;
            cursor: move;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px 12px 0 0;
            user-select: none;
        }

        .window-title span {
            flex: 1;
        }

        .window-buttons {
            display: flex;
            gap: 8px;
        }

        .window-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
            border-radius: 6px;
        }

        .window-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .window-btn.close:hover {
            background: #e81828;
        }

        .window-content {
            flex: 1;
            padding: 16px;
            overflow: auto;
            background: rgba(32, 32, 32, 0.5);
        }

        /* タスクバー */
        .taskbar {
            height: 56px;
            background: rgba(32, 32, 32, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 10000;
            padding: 0 12px;
        }

        .taskbar-apps {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .taskbar-app {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0;
        }

        .taskbar-app:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .taskbar-app.active {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .taskbar-end {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            font-size: 12px;
        }

        .clock {
            padding: 0 12px;
            text-align: right;
            font-weight: 500;
        }

        /* スタートメニュー */
        .start-menu {
            position: fixed;
            bottom: 56px;
            left: 50%;
            transform: translateX(-50%);
            width: 540px;
            max-height: 680px;
            background: rgba(32, 32, 32, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: none;
            flex-direction: column;
            z-index: 9999;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .start-menu.active {
            display: flex;
        }

        .start-menu-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 16px;
            font-weight: 600;
            color: white;
        }

        .start-menu-items {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .start-menu-item {
            padding: 12px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            font-size: 14px;
            color: white;
            border-radius: 8px;
            margin-bottom: 4px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .start-menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .start-menu-item-icon {
            font-size: 20px;
        }

        /* To-Do List スタイル */
        .todolist-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .todo-input-section {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: rgba(45, 45, 45, 0.7);
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .todo-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .todo-input:focus {
            outline: none;
            border-color: rgba(0, 120, 212, 0.5);
            background: rgba(255, 255, 255, 0.08);
        }

        .todo-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .todo-priority-select {
            padding: 6px 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            cursor: pointer;
        }

        .todo-priority-select:focus {
            outline: none;
            border-color: rgba(0, 120, 212, 0.5);
        }

        .todo-add-btn {
            padding: 8px 16px;
            background: rgba(0, 120, 212, 0.8);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .todo-add-btn:hover {
            background: rgba(0, 120, 212, 1);
        }

        .todo-stats {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: rgba(45, 45, 45, 0.7);
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
        }

        .todo-stat {
            flex: 1;
        }

        .todo-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: rgba(45, 45, 45, 0.7);
            border-radius: 8px;
            font-size: 13px;
            color: white;
            transition: all 0.2s;
        }

        .todo-item:hover {
            background: rgba(45, 45, 45, 0.9);
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: rgba(255, 255, 255, 0.5);
        }

        .todo-checkbox {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .todo-text {
            flex: 1;
        }

        .todo-priority-tag {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }

        .todo-priority-tag.high {
            background: rgba(232, 24, 40, 0.3);
            color: #ff6b6b;
        }

        .todo-priority-tag.medium {
            background: rgba(255, 206, 0, 0.3);
            color: #ffd666;
        }

        .todo-priority-tag.low {
            background: rgba(16, 185, 129, 0.3);
            color: #5eead4;
        }

        .todo-delete-btn {
            width: 24px;
            height: 24px;
            background: rgba(232, 24, 40, 0.2);
            border: none;
            color: #ff6b6b;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .todo-delete-btn:hover {
            background: rgba(232, 24, 40, 0.5);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        /* メモ帳 */
        .notepad-textarea {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: white;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            padding: 8px;
            resize: none;
        }

        .notepad-textarea:focus {
            outline: none;
            border-color: rgba(0, 120, 212, 0.5);
            background: rgba(255, 255, 255, 0.08);
        }

        .notepad-textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* 計算機 */
        .calculator {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .calc-display {
            grid-column: 1 / -1;
            background: rgba(45, 45, 45, 0.7);
            color: #0078d4;
            padding: 12px;
            text-align: right;
            font-size: 24px;
            font-family: 'Courier New', monospace;
            margin-bottom: 8px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .calc-btn {
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .calc-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .calc-btn.operator {
            background: rgba(0, 120, 212, 0.3);
            border-color: rgba(0, 120, 212, 0.5);
            color: #0078d4;
        }

        .calc-btn.operator:hover {
            background: rgba(0, 120, 212, 0.5);
        }

        .calc-btn.equals {
            grid-column: 1 / -1;
            background: rgba(0, 120, 212, 0.5);
            border-color: rgba(0, 120, 212, 0.7);
        }

        .calc-btn.equals:hover {
            background: rgba(0, 120, 212, 0.7);
        }

        /* スクロール */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="desktop-container">
        <div class="desktop-area">
            <!-- デスクトップアイコン -->
            <div class="desktop-icons">
                <div class="desktop-icon" ondblclick="openWindow('notepad')">
                    <div class="desktop-icon-image">📝</div>
                    <div class="desktop-icon-label">メモ帳</div>
                </div>
                <div class="desktop-icon" ondblclick="openWindow('calculator')">
                    <div class="desktop-icon-image">🧮</div>
                    <div class="desktop-icon-label">計算機</div>
                </div>
                <div class="desktop-icon" ondblclick="openWindow('todolist')">
                    <div class="desktop-icon-image">✓</div>
                    <div class="desktop-icon-label">タスク</div>
                </div>
            </div>

            <!-- スタートメニュー -->
            <div class="start-menu" id="startMenu">
                <div class="start-menu-header">👤 Windows 11</div>
                <div class="start-menu-items">
                    <button class="start-menu-item" onclick="openWindow('notepad'); closeStartMenu()">
                        <span class="start-menu-item-icon">📝</span>
                        <span>メモ帳</span>
                    </button>
                    <button class="start-menu-item" onclick="openWindow('calculator'); closeStartMenu()">
                        <span class="start-menu-item-icon">🧮</span>
                        <span>計算機</span>
                    </button>
                    <button class="start-menu-item" onclick="openWindow('todolist'); closeStartMenu()">
                        <span class="start-menu-item-icon">✓</span>
                        <span>タスク管理</span>
                    </button>
                </div>
            </div>

            <!-- ウィンドウ -->
            <!-- メモ帳 -->
            <div class="window hidden" id="notepadWindow" style="width: 600px; height: 400px; left: 100px; top: 100px;">
                <div class="window-title">
                    <span>📝 メモ帳</span>
                    <div class="window-buttons">
                        <button class="window-btn" onclick="minimizeWindow('notepadWindow')">_</button>
                        <button class="window-btn" onclick="minimizeWindow('notepadWindow')">□</button>
                        <button class="window-btn close" onclick="closeWindow('notepadWindow')">✕</button>
                    </div>
                </div>
                <div class="window-content">
                    <textarea class="notepad-textarea" id="notepadText" placeholder="ここに入力..."></textarea>
                </div>
            </div>

            <!-- 計算機 -->
            <div class="window hidden" id="calculatorWindow" style="width: 350px; height: 450px; left: 400px; top: 150px;">
                <div class="window-title">
                    <span>🧮 計算機</span>
                    <div class="window-buttons">
                        <button class="window-btn" onclick="minimizeWindow('calculatorWindow')">_</button>
                        <button class="window-btn" onclick="minimizeWindow('calculatorWindow')">□</button>
                        <button class="window-btn close" onclick="closeWindow('calculatorWindow')">✕</button>
                    </div>
                </div>
                <div class="window-content">
                    <div class="calculator" id="calculator"></div>
                </div>
            </div>

            <!-- To-Do List -->
            <div class="window hidden" id="todolistWindow" style="width: 550px; height: 500px; left: 700px; top: 200px;">
                <div class="window-title">
                    <span>✓ タスク</span>
                    <div class="window-buttons">
                        <button class="window-btn" onclick="minimizeWindow('todolistWindow')">_</button>
                        <button class="window-btn" onclick="minimizeWindow('todolistWindow')">□</button>
                        <button class="window-btn close" onclick="closeWindow('todolistWindow')">✕</button>
                    </div>
                </div>
                <div class="window-content">
                    <div class="todolist-container">
                        <div class="todo-input-section">
                            <input type="text" class="todo-input" id="todoInput" placeholder="新しいタスク..." autocomplete="off">
                            <select class="todo-priority-select" id="todoPriority">
                                <option value="low">低</option>
                                <option value="medium" selected>中</option>
                                <option value="high">高</option>
                            </select>
                            <button class="todo-add-btn" onclick="addTodo()">追加</button>
                        </div>
                        <div class="todo-stats">
                            <div class="todo-stat">合計: <strong id="todoTotal">0</strong></div>
                            <div class="todo-stat">完了: <strong id="todoDone">0</strong></div>
                            <div class="todo-stat">未完: <strong id="todoPending">0</strong></div>
                        </div>
                        <div class="todo-list" id="todoListContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- タスクバー -->
        <div class="taskbar">
            <div class="taskbar-apps">
                <button class="taskbar-app" onclick="toggleStartMenu()" title="スタート">⊞</button>
                <button class="taskbar-app" id="taskbarNotepad" onclick="toggleWindow('notepadWindow')" title="メモ帳">📝</button>
                <button class="taskbar-app" id="taskbarCalculator" onclick="toggleWindow('calculatorWindow')" title="計算機">🧮</button>
                <button class="taskbar-app" id="taskbarTodolist" onclick="toggleWindow('todolistWindow')" title="タスク">✓</button>
            </div>
            <div class="taskbar-end">
                <div class="clock" id="clock">12:00</div>
            </div>
        </div>
    </div>

    <script>
        let todos = [];
        let calcDisplay = '0';
        let calcOperator = null;
        let calcPrevValue = null;
        let calcNewNumber = true;
        let currentZ = 100;

        // ========== ウィンドウ管理 ==========
        function openWindow(windowId) {
            const window = document.getElementById(windowId + 'Window');
            if (window) {
                window.classList.remove('hidden');
                window.style.zIndex = ++currentZ;
                updateTaskbar();
            }
        }

        function closeWindow(windowId) {
            const window = document.getElementById(windowId);
            window.classList.add('hidden');
            updateTaskbar();
        }

        function minimizeWindow(windowId) {
            const window = document.getElementById(windowId);
            window.classList.add('hidden');
            updateTaskbar();
        }

        function toggleWindow(windowId) {
            const window = document.getElementById(windowId);
            if (window.classList.contains('hidden')) {
                window.classList.remove('hidden');
                window.style.zIndex = ++currentZ;
            } else {
                window.classList.add('hidden');
            }
            updateTaskbar();
        }

        // ========== ドラッグ機能 ==========
        let dragElement = null;
        let offsetX = 0;
        let offsetY = 0;

        document.addEventListener('mousedown', (e) => {
            if (e.target.closest('.window-title')) {
                dragElement = e.target.closest('.window');
                dragElement.style.zIndex = ++currentZ;
                const rect = dragElement.getBoundingClientRect();
                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (dragElement) {
                dragElement.style.left = (e.clientX - offsetX) + 'px';
                dragElement.style.top = (e.clientY - offsetY) + 'px';
            }
        });

        document.addEventListener('mouseup', () => {
            dragElement = null;
        });

        // ========== スタートメニュー ==========
        function toggleStartMenu() {
            const menu = document.getElementById('startMenu');
            menu.classList.toggle('active');
        }

        function closeStartMenu() {
            const menu = document.getElementById('startMenu');
            menu.classList.remove('active');
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.start-menu-item') && !e.target.closest('.taskbar-app')) {
                closeStartMenu();
            }
        });

        // ========== タスクバー更新 ==========
        function updateTaskbar() {
            const notepadWindow = document.getElementById('notepadWindow');
            const calculatorWindow = document.getElementById('calculatorWindow');
            const todolistWindow = document.getElementById('todolistWindow');

            document.getElementById('taskbarNotepad').classList.toggle('active', !notepadWindow.classList.contains('hidden'));
            document.getElementById('taskbarCalculator').classList.toggle('active', !calculatorWindow.classList.contains('hidden'));
            document.getElementById('taskbarTodolist').classList.toggle('active', !todolistWindow.classList.contains('hidden'));
        }

        // ========== 時計 ==========
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }

        setInterval(updateClock, 1000);
        updateClock();

        // ========== 計算機 ==========
        function createCalculator() {
            const buttons = [
                ['C', '←', '%', '/'],
                ['7', '8', '9', '*'],
                ['4', '5', '6', '-'],
                ['1', '2', '3', '+'],
                ['0', '.', '=']
            ];

            const container = document.getElementById('calculator');
            container.innerHTML = '<div class="calc-display" id="calcDisplay">0</div>';

            buttons.forEach((row, rowIdx) => {
                row.forEach((btn, colIdx) => {
                    const button = document.createElement('button');
                    button.className = `calc-btn ${['/', '*', '-', '+'].includes(btn) ? 'operator' : ''} ${btn === '=' ? 'equals' : ''}`;
                    button.textContent = btn;
                    if (btn === '0') button.style.gridColumn = '1 / 3';
                    button.onclick = () => handleCalcButton(btn);
                    container.appendChild(button);
                });
            });
        }

        function handleCalcButton(btn) {
            const display = document.getElementById('calcDisplay');

            if (btn === 'C') {
                calcDisplay = '0';
                calcOperator = null;
                calcPrevValue = null;
                calcNewNumber = true;
            } else if (btn === '←') {
                calcDisplay = calcDisplay.slice(0, -1) || '0';
            } else if (btn === '%') {
                calcDisplay = String(parseFloat(calcDisplay) / 100);
            } else if (['+', '-', '*', '/'].includes(btn)) {
                calcPrevValue = parseFloat(calcDisplay);
                calcOperator = btn;
                calcNewNumber = true;
            } else if (btn === '=') {
                if (calcOperator && calcPrevValue !== null) {
                    const curr = parseFloat(calcDisplay);
                    let result = 0;
                    switch (calcOperator) {
                        case '+': result = calcPrevValue + curr; break;
                        case '-': result = calcPrevValue - curr; break;
                        case '*': result = calcPrevValue * curr; break;
                        case '/': result = calcPrevValue / curr; break;
                    }
                    calcDisplay = String(result);
                    calcOperator = null;
                    calcPrevValue = null;
                    calcNewNumber = true;
                }
            } else {
                if (calcNewNumber) {
                    calcDisplay = btn;
                    calcNewNumber = false;
                } else {
                    calcDisplay = calcDisplay === '0' ? btn : calcDisplay + btn;
                }
            }

            display.textContent = calcDisplay;
        }

        // ========== To-Do List ==========
        function loadTodos() {
            const saved = localStorage.getItem('win11Todos');
            if (saved) {
                todos = JSON.parse(saved);
            }
            renderTodos();
        }

        function saveTodos() {
            localStorage.setItem('win11Todos', JSON.stringify(todos));
        }

        function addTodo() {
            const input = document.getElementById('todoInput');
            const priority = document.getElementById('todoPriority').value;
            const text = input.value.trim();

            if (text === '') return;

            todos.unshift({
                id: Date.now(),
                text: text,
                completed: false,
                priority: priority
            });

            input.value = '';
            input.focus();
            saveTodos();
            renderTodos();
        }

        function toggleTodo(id) {
            todos = todos.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
            saveTodos();
            renderTodos();
        }

        function deleteTodo(id) {
            todos = todos.filter(t => t.id !== id);
            saveTodos();
            renderTodos();
        }

        function renderTodos() {
            const container = document.getElementById('todoListContainer');
            const total = todos.length;
            const done = todos.filter(t => t.completed).length;
            const pending = total - done;

            document.getElementById('todoTotal').textContent = total;
            document.getElementById('todoDone').textContent = done;
            document.getElementById('todoPending').textContent = pending;

            if (todos.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">✨</div><div>タスクなし</div></div>';
                return;
            }

            container.innerHTML = todos.map(todo => `
                <div class="todo-item ${todo.completed ? 'completed' : ''}">
                    <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${todo.id})">
                    <div class="todo-text">${todo.text}</div>
                    <span class="todo-priority-tag ${todo.priority}">${todo.priority}</span>
                    <button class="todo-delete-btn" onclick="deleteTodo(${todo.id})">✕</button>
                </div>
            `).join('');
        }

        // ========== Enter キー対応 ==========
        document.getElementById('todoInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTodo();
        });

        // ========== 初期化 ==========
        createCalculator();
        loadTodos();
    </script>
</body>
</html>
